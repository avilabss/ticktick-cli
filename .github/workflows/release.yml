name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./...

  tag:
    name: Tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get next version
        id: version
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          major=$(echo "$latest" | cut -d. -f1 | tr -d v)
          minor=$(echo "$latest" | cut -d. -f2)
          patch=$(echo "$latest" | cut -d. -f3)
          echo "version=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o "tick-${GOOS}-${GOARCH}${ext}" ./cmd/tick
      - uses: actions/upload-artifact@v4
        with:
          name: tick-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tick-*

  release:
    name: Publish Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum tick-* > checksums.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ needs.tag.outputs.version }} tick-* checksums.txt --repo ${{ github.repository }} --generate-notes
